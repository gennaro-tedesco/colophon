name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, amd64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: wails build -platform darwin/${{ matrix.arch }} -ldflags "-X main.version=${VERSION}"

      - name: Ad-hoc sign app
        run: codesign --force --deep --sign - build/bin/colophon.app

      - name: Verify signature
        run: codesign --verify --deep --strict --verbose=2 build/bin/colophon.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Prepare DMG contents
        run: |
          rm -rf dist
          mkdir -p dist
          cp -R build/bin/colophon.app dist/

      - name: Create DMG
        run: |
          create-dmg \
            --volname "colophon" \
            --window-size 600 400 \
            --icon "colophon.app" 150 200 \
            --app-drop-link 450 200 \
            --no-internet-enable \
            "colophon-${{ matrix.arch }}.dmg" \
            dist

      - uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: colophon-${{ matrix.arch }}.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" *.dmg --repo "$GITHUB_REPOSITORY" --title "colophon $TAG" --generate-notes
